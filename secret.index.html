<!DOCTYPE html>
<html>
<head>
  <title>Surat Cinta</title>
  <style>
    body { background: #1a1a2e; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; overflow: hidden; font-family: sans-serif; cursor: pointer; }
    .scroll { display: flex; flex-direction: column; align-items: center; z-index: 10; }
    .wood { width: 280px; height: 20px; background: #8d6e63; border-radius: 10px; }
    .paper { width: 250px; height: 0; background: #f8f1e5; transition: 1.5s; overflow: hidden; display: flex; justify-content: center; align-items: center; box-shadow: 0 5px 15px rgba(0,0,0,0.5); }
    .msg { color: #333; font-weight: bold; opacity: 0; transition: 1s; font-size: 1.2rem; text-align: center; padding: 10px; }
    
    /* Saat aktif */
    .active .paper { height: 200px; }
    .active .msg { opacity: 1; }

    /* Hati */
    .heart { position: absolute; color: #ff4d6d; animation: fly 3s linear forwards; pointer-events: none; }
    @keyframes fly { 
        0% { transform: translateY(0) scale(1); opacity: 1; } 
        100% { transform: translateY(-100vh) scale(1.5); opacity: 0; } 
    }
  </style>
</head>
<body onclick="buka()">
  <div id="info" style="color: white; position: absolute; top: 10%;">Klik di mana saja...</div>
  
  <div class="scroll" id="box">
    <div class="wood"></div>
    <div class="paper"><div class="msg">"I Love You To The Moon And Back" 🌙✨</div></div>
    <div class="wood"></div>
  </div>

  <script>
    function buka() {
      document.getElementById("box").classList.add("active");
      document.getElementById("info").style.display = "none";
      for(let i=0; i<30; i++) {
        setTimeout(createHeart, i * 100);
      }
    }

    function createHeart() {
      const h = document.createElement("div");
      h.className = "heart";
      h.innerHTML = "❤️";
      h.style.left = Math.random() * 100 + "vw";
      h.style.bottom = "0";
      h.style.fontSize = (Math.random() * 20 + 20) + "px";
      document.body.appendChild(h);
      setTimeout(() => h.remove(), 3000);
    }
  </script>
</body>
</html>
